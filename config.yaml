project:
  name: "medical-data-agent"
  mode: "demo"

paths:
  raw_data_path: "data/demo/demo_raw.csv"
  mapping_config_path: "outputs/audit_logs/mapping_config_demo.json"
  mapping_qc_output_path: "outputs/audit_logs/mapping_qc_report_demo.csv"
  data_quality_output_path: "outputs/audit_logs/data_quality_report_demo.csv"
  adsl_output_path: "data/adam_like/adsl_demo.csv"
  adeff_output_path: "data/adam_like/adeff_demo.csv"
  table_one_output_path: "outputs/tables/table_one_demo.csv"
  primary_endpoint_table_output_path: "outputs/tables/primary_endpoint_table_demo.csv"
  treatment_difference_output_path: "outputs/tables/treatment_difference_demo.csv"
  exploratory_ttest_output_path: "outputs/tables/exploratory_ttest_demo.csv"
  raw_ae_data_path: "data/demo/demo_ae_raw.csv"
  adae_output_path: "data/adam_like/adae_demo.csv"
  safety_summary_table_output_path: "outputs/tables/safety_summary_table_demo.csv"
  report_output_path: "outputs/reports/mini_csr_report_demo.md"

mapping_review:
  auto_accept_threshold: 0.90

manual_overrides:
  Followup_SBP:
    target_variable: "AVAL"
    human_decision: "manually_accepted"
    reason: "Creator confirmed Followup_SBP as the post-baseline analysis value for the demo endpoint."

endpoint:
  primary_endpoint_name: "Change from baseline in systolic blood pressure"
  baseline_variable: "BASELINE"
  analysis_variable: "AVAL"
  treatment_variable: "TRT01P"
  active_group: "Drug A"
  control_group: "Placebo"
  alpha: 0.05
